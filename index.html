<!DOCTYPE html>
<html>
<head>
    <title>Simple Duplex Audio</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #121212; color: white; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; margin: 10px; }
        #micBtn { background: #2ecc71; color: white; }
        #logoutBtn { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h1>Full-Duplex Audio</h1>
    <button id="micBtn" onclick="toggleMic()">Mic: ON</button>
    <button id="logoutBtn" onclick="location.reload()">Logout</button>
    
    <audio id="remoteAudio" autoplay></audio>

    <script>
        const socket = io('https://voip-frontend-8slj.onrender.com', {
            transports: ['websocket'],
            upgrade: false
        });

        let localStream;
        let peerConnection;

        // FIXED: Added missing commas and fixed '3.1'/'4.1' typos to '3.l'/'4.l'
        const iceConfiguration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' }
            ],
            iceTransportPolicy: 'all',
            bundlePolicy: 'max-bundle'
        };

        async function init() {
            try {
                // 1. Get Mic Access
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false,
                        channelCount: 2,
                        sampleRate: 48000
                    }
                });
                
                // 2. Setup Peer Connection
                peerConnection = new RTCPeerConnection(iceConfiguration);
                
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                peerConnection.ontrack = event => {
                    document.getElementById('remoteAudio').srcObject = event.streams[0];
                };

                peerConnection.onicecandidate = event => {
                    if (event.candidate) socket.emit('signal', { candidate: event.candidate });
                };

                socket.on('signal', async (data) => {
                    if (data.offer) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                        const answer = await peerConnection.createAnswer();
                        answer.sdp = setHighBitrate(answer.sdp);
                        await peerConnection.setLocalDescription(answer);
                        socket.emit('signal', { answer: answer });
                    } else if (data.answer) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    } else if (data.candidate) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    }
                });

                // Start the call
                const offer = await peerConnection.createOffer();
                offer.sdp = setHighBitrate(offer.sdp);
                await peerConnection.setLocalDescription(offer);
                socket.emit('signal', { offer: offer });

                console.log("System Initialized & Connected");

            } catch (err) {
                console.error("Initialization failed:", err);
            }
        }

        function toggleMic() {
            if (!localStream) return;
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('micBtn');
            btn.innerText = track.enabled ? "Mic: ON" : "Mic: OFF";
            btn.style.background = track.enabled ? "#2ecc71" : "#95a5a6";
        }

        function setHighBitrate(sdp) {
            return sdp.replace(/a=fmtp:111/, "a=fmtp:111;maxaveragebitrate=510000;stereo=1;sprop-stereo=1");
        }

        init();
    </script>
</body>
</html>
